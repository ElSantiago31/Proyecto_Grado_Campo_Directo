<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campo Directo - Conectando campesinos directamente con compradores{% endblock %}</title>
    <meta name="description" content="{% block description %}Plataforma web que conecta productores agrícolas directamente con consumidores{% endblock %}">
    
    {% load static %}
    {% load tz %}
    
    <!-- CSS Base -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    
    <!-- CSS específicos por página -->
    {% block extra_css %}{% endblock %}
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    
    {% block content %}
    <!-- El contenido se renderizará aquí -->
    {% endblock %}
    
    <!-- Scripts base -->
    <script src="{% static 'js/config/api.js' %}?v={% now 'U' %}"></script>
    
    <!-- Scripts específicos por página -->
    {% block extra_js %}{% endblock %}
    
    <!-- Configuración global de Django -->
    <script>
        // Configuración para CSRF token
        window.csrfToken = '{{ csrf_token }}';
        
        // Configuración de Django para el frontend
        window.djangoConfig = {
            mediaUrl: '{{ MEDIA_URL }}',
            staticUrl: '{{ STATIC_URL }}',
            debug: {% if debug %}true{% else %}false{% endif %}
        };
    </script>
    <!-- Lightbox Modal Universal para Imágenes -->
    <div id="imageLightboxModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.85); z-index: 999999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; cursor: zoom-out;" onclick="closeLightbox()">
        <img id="imageLightboxContent" src="" style="max-width: 90%; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain; transform: scale(0.95); transition: transform 0.3s ease;">
    </div>

    <script>
        function openLightbox(imageUrl) {
            const modal = document.getElementById('imageLightboxModal');
            const img = document.getElementById('imageLightboxContent');
            img.src = imageUrl;
            modal.style.display = 'flex';
            // Pequeño delay para permitir la transición fluida
            setTimeout(() => {
                modal.style.opacity = '1';
                img.style.transform = 'scale(1)';
            }, 10);
        }

        function closeLightbox() {
            const modal = document.getElementById('imageLightboxModal');
            const img = document.getElementById('imageLightboxContent');
            modal.style.opacity = '0';
            img.style.transform = 'scale(0.95)';
            setTimeout(() => {
                modal.style.display = 'none';
                img.src = ''; // Limpiar
            }, 300);
        }
    </script>
    <!-- Modal de Reseñas del Productor -->
    <div id="resenasModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:999998; justify-content:center; align-items:center; opacity:0; transition: opacity 0.3s ease;" onclick="closeResenasModal(event)">
        <div style="background:#fff; border-radius:16px; max-width:560px; width:92%; max-height:80vh; overflow-y:auto; padding:0; box-shadow:0 20px 60px rgba(0,0,0,0.3); position:relative;" onclick="event.stopPropagation()">
            <!-- Header del modal -->
            <div style="background: linear-gradient(135deg, #2d5016, #4a7c26); color:white; padding:20px 24px; border-radius:16px 16px 0 0; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h3 id="resenasModalTitle" style="margin:0; font-size:1.2rem;">Reseñas del Productor</h3>
                    <p id="resenasModalSubtitle" style="margin:4px 0 0; font-size:0.85rem; opacity:0.85;"></p>
                </div>
                <button onclick="closeResenasModalBtn()" style="background:rgba(255,255,255,0.2); border:none; color:white; width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center;">&times;</button>
            </div>
            <!-- Resumen de estrellas -->
            <div id="resenasModalResumen" style="padding:16px 24px; border-bottom:1px solid #eee; text-align:center;"></div>
            <!-- Lista de comentarios -->
            <div id="resenasModalLista" style="padding:16px 24px;"></div>
        </div>
    </div>

    <script>
        async function showReviewsModal(campesinoId, campesinoNombre) {
            const modal = document.getElementById('resenasModal');
            const title = document.getElementById('resenasModalTitle');
            const subtitle = document.getElementById('resenasModalSubtitle');
            const resumen = document.getElementById('resenasModalResumen');
            const lista = document.getElementById('resenasModalLista');

            title.textContent = campesinoNombre || 'Reseñas del Productor';
            subtitle.textContent = 'Cargando comentarios...';
            resumen.innerHTML = '';
            lista.innerHTML = '<p style="text-align:center; color:#aaa; padding:20px;">⏳ Cargando reseñas...</p>';

            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; }, 10);

            try {
                const data = await userApi.getResenasCampesino(campesinoId);
                const prom = parseFloat(data.calificacion_promedio || 0);
                const total = data.total_calificaciones || 0;
                const resenas = data.resenas || [];

                subtitle.textContent = `${total} calificación${total !== 1 ? 'es' : ''} recibida${total !== 1 ? 's' : ''}`;

                // Resumen visual
                const estrellas = '⭐'.repeat(Math.round(prom)) + '☆'.repeat(5 - Math.round(prom));
                resumen.innerHTML = `
                    <div style="font-size:2rem;">${estrellas}</div>
                    <div style="font-size:1.5rem; font-weight:bold; color:#2d5016;">${prom > 0 ? prom.toFixed(1) : 'Sin calificación'} <span style="font-size:1rem; color:#777;">/ 5.0</span></div>
                    <div style="font-size:0.85rem; color:#888;">${total} opiniones de compradores</div>
                `;

                if (resenas.length === 0) {
                    lista.innerHTML = '<p style="text-align:center; color:#aaa; padding:30px;">🌱 Este productor aún no tiene comentarios.<br>¡Sé el primero en calificarlo!</p>';
                    return;
                }

                lista.innerHTML = resenas.map(r => {
                    const starsFull = Math.min(5, Math.max(0, parseInt(r.calificacion) || 0));
                    const starsHtml = '⭐'.repeat(starsFull) + '☆'.repeat(5 - starsFull);
                    const comentario = r.comentario ? `<p style="margin:6px 0 0; color:#444; font-size:0.9rem; font-style:italic;">"${r.comentario}"</p>` : '';
                    return `
                        <div style="padding:14px 0; border-bottom:1px solid #f0f0f0;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-weight:600; color:#333;">👤 ${r.comprador_nombre}</span>
                                <span style="font-size:0.8rem; color:#aaa;">${r.fecha}</span>
                            </div>
                            <div style="font-size:1rem; margin-top:4px;">${starsHtml}</div>
                            ${comentario}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                lista.innerHTML = '<p style="text-align:center; color:#e74c3c; padding:20px;">❌ No se pudieron cargar las reseñas. Inténtalo luego.</p>';
                console.error('Error cargando reseñas:', err);
            }
        }

        function closeResenasModal(event) {
            if (event.target === document.getElementById('resenasModal')) {
                closeResenasModalBtn();
            }
        }

        function closeResenasModalBtn() {
            const modal = document.getElementById('resenasModal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    </script>
</body>
</html>
